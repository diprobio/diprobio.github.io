name: Validate Metadata

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - "assets/**"
      - "index.html"
      - "package.json"
      - ".github/workflows/validate.yml"
  push:
    branches: ["main"]
    paths:
      - "data/**"
      - "scripts/**"
      - "assets/**"
      - "index.html"
      - "package.json"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate project metadata
        run: npm run validate

      - name: Syntax check frontend script
        run: node --check assets/main.js
